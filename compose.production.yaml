# Production overrides.
#
# Usage:
#   docker compose -f compose.yaml -f compose.production.yaml up -d
#
# Requires .env.production to define:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   PGADMIN_EMAIL, PGADMIN_DEFAULT_PASSWORD
#   DATABASE_URL  (full connection string — do not rely on shell interpolation)

services:
  site:
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PUBLIC_API_URL: https://api.yourdomain.com

  api:
    env_file:
      - .env.production
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: warn
      DATABASE_URL: ${DATABASE_URL}

  db:
    env_file:
      - .env.production
