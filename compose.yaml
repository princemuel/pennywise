services:
  site:
    container_name: pennsite
    build:
      context: .
      dockerfile: apps/site/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - pennywise
    depends_on:
      api:
        condition: service_healthy

  api:
    container_name: pennapi
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "8080"
    networks:
      - pennywise
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: penndb
    image: postgres:18-trixie
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - pennywise
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pennpgadmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    expose:
      - "80"
    networks:
      - pennywise
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local

networks:
  pennywise:
    driver: bridge
